<!DOCTYPE html>
<html>
<head>
    <title>Weather Result</title>
</head>
<body style="background-color: lavender;">

<h1>Weather Result 🌦️</h1>

<div id="result"></div>

<script>
async function getWeather() {

    // get city from URL
    const params = new URLSearchParams(window.location.search);
    const city = params.get("city");

    const res = await fetch(`/weather?city=${city}`);
    const data = await res.json();

    if (data.error) {
        document.getElementById("result").innerHTML = "❌ City not found";
        return;
    }
document.getElementById("result").innerHTML = `
    <h2>${city}</h2>
    <p>🌡️ Temperature: ${data.current_condition[0].temp_C} °C</p>
    <p>☁️ Weather: ${data.current_condition[0].weatherDesc[0].value}</p>
    <p>💧 Humidity: ${data.current_condition[0].humidity}%</p>
    <p>🌬️ Wind: ${data.current_condition[0].windspeedKmph} km/h</p>
`;
}

getWeather();
</script>

</body>
</html>
